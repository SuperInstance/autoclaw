## Customizing Limits

Edit this file directly:

```bash
# Increase agent pool for a one-time big job
sed -i 's/agent_pool_max: 32/agent_pool_max: 64/' policy/resource_policy.yaml
crew start --swarm --agents 8

# Restore after done
git checkout policy/resource_policy.yaml
```

Or create a `.local.yaml` override:

```yaml
# policy/resource_policy.local.yaml
cpu:
  agent_pool_max: 8
knowledge:
  hot_tier_entries: 500  # Tighter memory budget
```

Then load it:
```bash
export AUTOCLAW_POLICY_OVERRIDE=policy/resource_policy.local.yaml
crew health
```

---

**These constraints exist to prevent surprises: no runaway costs, no OOM crashes, no lost work.**
