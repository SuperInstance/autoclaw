# ============================================================================
# TRAINING DATA SCHEMA
# ============================================================================
# Defines the structure for all training data generated by the crew.
# Training data is the crew's primary output for fine-tuning specialist models.
#
# The crew generates training data in multiple formats:
#   - Q&A pairs (for factual recall)
#   - Instruction-response pairs (for task following)
#   - Socratic dialogues (for reasoning chains)
#   - Completion examples (for open-ended generation)
#
# Quality control pipeline:
#   Teacher generates → Critic scores → Distiller curates → LoRA dataset
#
# IMPLEMENTATION NOTES:
# - Raw examples stored in data/training/{dataset_tag}/raw/
# - Curated examples in data/training/{dataset_tag}/curated/
# - LoRA-ready JSONL in data/training/{dataset_tag}/lora.jsonl
# - Metadata in data/training/{dataset_tag}/meta.yaml
# ============================================================================

training_example:
  id:
    type: string
    pattern: "{dataset_tag}_{sequence_number}"
    example: "lr-theory-2026-03_0042"
    description: "Unique example identifier within a dataset"

  format:
    type: enum
    values:
      - qa_pair             # Question + Answer (factual recall)
      - instruction_response # Instruction + Response (task following)
      - dialogue            # Multi-turn conversation (reasoning chains)
      - completion          # Prefix + Completion (open-ended generation)
    description: "Training format determines how the example is used in fine-tuning"

  # --- Content (format-specific) ---
  content:
    type: object
    description: "Format-specific content. Fields depend on 'format'."
    fields:

      # For qa_pair:
      question:
        type: string
        nullable: true
        description: "The question posed (qa_pair format)"
        example: "Why does learning rate warmup prevent early training instability?"

      answer:
        type: string
        nullable: true
        description: "The correct answer (qa_pair format)"
        example: "During warmup, the learning rate starts near zero and increases gradually..."

      # For instruction_response:
      instruction:
        type: string
        nullable: true
        description: "The task instruction (instruction_response format)"
        example: "Explain the relationship between batch size and optimal learning rate."

      response:
        type: string
        nullable: true
        description: "The expected response (instruction_response format)"

      # For dialogue:
      turns:
        type: list
        nullable: true
        items:
          type: object
          fields:
            role:
              type: enum
              values: [user, assistant, system]
              description: "Speaker role in the conversation turn"
            content:
              type: string
              description: "Text content of this conversation turn"
        description: "Ordered conversation turns (dialogue format)"

      # For completion:
      prefix:
        type: string
        nullable: true
        description: "The prompt prefix (completion format)"

      completion:
        type: string
        nullable: true
        description: "The expected completion (completion format)"

  # --- Metadata ---
  source_topic:
    type: string
    description: "The knowledge topic this example covers"
    example: "learning-rate-warmup"

  source_knowledge_ids:
    type: list
    items:
      type: integer
    default: []
    description: "Knowledge entry IDs that informed this example"

  source_urls:
    type: list
    items:
      type: string
    default: []
    description: "External URLs cited in this example"

  difficulty:
    type: enum
    values:
      - beginner    # Foundational concept, simple language
      - intermediate # Requires domain knowledge
      - advanced    # Expert-level, assumes deep background
      - expert      # Cutting-edge, research-level
    default: intermediate
    description: "Difficulty level for curriculum learning"

  # --- Quality ---
  quality_score:
    type: float
    min: 0.0
    max: 1.0
    nullable: true
    description: |
      Quality score assigned by the Critic agent.
      0.0 = unusable, 1.0 = perfect.
      Examples below 0.6 are excluded from LoRA datasets.

  quality_flags:
    type: list
    items:
      type: enum
      values:
        - factually_incorrect   # Contains wrong information
        - too_vague             # Not specific enough to be useful
        - too_long              # Exceeds useful length for training
        - hallucinated_source   # Cites non-existent source
        - duplicate             # Near-duplicate of another example
        - off_topic             # Doesn't match source_topic
        - low_diversity         # Too similar to existing examples
    default: []
    description: "Issues flagged by the Critic. Non-empty → review before use."

  # --- Provenance ---
  generated_by:
    type: string
    description: "Agent ID that generated this example"
    example: "teacher_1"

  language_model:
    type: string
    description: "LLM used to generate this example"
    example: "claude-haiku-4-5-20251001"

  scored_by:
    type: string
    nullable: true
    description: "Agent ID that scored this example (if scored)"
    example: "critic_1"

  dataset_tag:
    type: string
    description: "Dataset this example belongs to"
    example: "lr-theory-2026-03"

  created_at:
    type: datetime
    generated: true
    description: "When this training example was generated"

  scored_at:
    type: datetime
    nullable: true
    description: "When the Critic agent scored this example"

# ============================================================================
# DATASET SCHEMA
# ============================================================================
# A dataset is a curated collection of training examples for a specific topic.
# Datasets are the unit of LoRA training — one dataset = one fine-tuning run.

dataset:
  tag:
    type: string
    description: "Unique dataset identifier. Used as directory name."
    pattern: "{topic}-{YYYY-MM}"
    example: "lr-theory-2026-03"

  title:
    type: string
    description: "Human-readable dataset name"
    example: "Learning Rate Theory — March 2026"

  description:
    type: string
    description: "What this dataset covers and why it was created"

  topic_tags:
    type: list
    items:
      type: string
    description: "Knowledge topics covered by this dataset"
    example: ["learning-rate", "warmup", "cosine-annealing", "lr-schedule"]

  # --- Composition ---
  stats:
    type: object
    description: "Aggregate statistics for this dataset"
    fields:
      total_examples:
        type: integer
        description: "Total examples in dataset (all quality levels)"
      curated_examples:
        type: integer
        description: "Examples passing quality threshold (quality_score >= 0.6)"
      by_format:
        type: object
        description: "Count per format"
        fields:
          qa_pair: {type: integer, default: 0}
          instruction_response: {type: integer, default: 0}
          dialogue: {type: integer, default: 0}
          completion: {type: integer, default: 0}
      by_difficulty:
        type: object
        description: "Example count per difficulty level"
        fields:
          beginner: {type: integer, default: 0}
          intermediate: {type: integer, default: 0}
          advanced: {type: integer, default: 0}
          expert: {type: integer, default: 0}
      avg_quality_score:
        type: float
        nullable: true

  # --- LoRA Export ---
  lora_export:
    type: object
    nullable: true
    description: "Populated when dataset is exported for LoRA training"
    fields:
      exported_at:
        type: datetime
        description: "When the LoRA export was generated"
      example_count:
        type: integer
        description: "Number of examples in the exported JSONL"
      format:
        type: enum
        values: [alpaca, sharegpt, chatml, raw_jsonl]
        description: "Export format for the fine-tuning framework"
      file_path:
        type: string
        description: "Path to the exported JSONL file"
        example: "data/training/lr-theory-2026-03/lora.jsonl"
      quality_threshold:
        type: float
        default: 0.6
        description: "Minimum quality_score for inclusion in export"

  # --- Lifecycle ---
  status:
    type: enum
    values:
      - collecting    # Still gathering examples
      - reviewing     # Critic is scoring examples
      - curated       # Scoring complete, ready for export
      - exported      # LoRA JSONL generated
      - training      # LoRA training in progress
      - complete      # Specialist model trained and deployed
    default: collecting
    description: "Current stage in the dataset lifecycle"

  created_at:
    type: datetime
    generated: true
    description: "When this dataset was first created"

  last_updated:
    type: datetime
    description: "When this dataset was last modified"

  source_task_ids:
    type: list
    items:
      type: integer
    description: "Task IDs that contributed examples to this dataset"

# ============================================================================
# QUALITY CONTROL RULES
# ============================================================================
#
# The crew applies these rules automatically:
#
# 1. GENERATION (Teacher):
#    - Generate examples from knowledge entries + source documents
#    - Self-estimate quality (quality_score) before submitting
#    - Flag obvious issues (too_long, off_topic)
#    - Target: 80% of examples should score >= 0.6
#
# 2. SCORING (Critic):
#    - Sample 20% of examples for detailed review
#    - Score all examples flagged by Teacher as uncertain
#    - Flag quality_flags for any issues found
#    - Reject (score < 0.4) examples with factual errors
#
# 3. CURATION (Distiller):
#    - Filter to quality_score >= 0.6 for LoRA export
#    - Deduplicate near-identical examples
#    - Balance difficulty distribution (target: 20/50/25/5 split)
#    - Ensure topic coverage across knowledge entries
#
# 4. EXPORT:
#    - Convert to target format (alpaca, sharegpt, etc.)
#    - Shuffle examples (prevent order bias)
#    - Split train/val (90/10 default)
#    - Log export stats to dataset metadata

# ============================================================================
# EXAMPLES
# ============================================================================

examples:
  qa_pair_example:
    id: "lr-theory-2026-03_0001"
    format: qa_pair
    content:
      question: "Why does learning rate warmup prevent early training instability?"
      answer: |
        During warmup, the learning rate starts very low (near zero) and increases
        gradually over the first N steps. This prevents large gradient updates in
        early training when model weights are randomly initialized and far from any
        useful representation. Without warmup, the first few batches can cause large
        weight updates in random directions, effectively 'poisoning' the model's
        early trajectory. The warmup period gives the optimizer time to accumulate
        gradient statistics before taking large steps.
    source_topic: "learning-rate-warmup"
    source_knowledge_ids: [1, 3, 20]
    source_urls: ["https://arxiv.org/abs/2603.12345"]
    difficulty: intermediate
    quality_score: 0.88
    quality_flags: []
    generated_by: "teacher_1"
    language_model: "claude-haiku-4-5-20251001"
    scored_by: "critic_1"
    dataset_tag: "lr-theory-2026-03"
    created_at: "2026-03-18T15:20:00Z"
    scored_at: "2026-03-18T16:05:00Z"

  instruction_response_example:
    id: "lr-theory-2026-03_0042"
    format: instruction_response
    content:
      instruction: |
        Given a transformer model with DEPTH=8 and batch_size=32, recommend an
        optimal learning rate schedule and explain your reasoning.
      response: |
        For a DEPTH=8 transformer with batch_size=32, I recommend:

        Base LR: 0.005 (±0.001) — validated across 24 experiments at this depth.
        Schedule: Cosine annealing with warmup
        Warmup steps: 100 — critical for stability at LR > 0.003
        Min LR: 0.0001 — below this, annealing provides no benefit

        Reasoning: Cosine annealing consistently outperforms fixed LR by 0.8-1.5%
        at this configuration. The 100-step warmup prevents the 40% divergence rate
        seen with fewer than 50 warmup steps. Weight decay of 0.01 pairs well with
        this schedule.
    source_topic: "learning-rate-schedule"
    source_knowledge_ids: [1, 5, 15]
    difficulty: advanced
    quality_score: 0.92
    quality_flags: []
    generated_by: "teacher_1"
    language_model: "claude-haiku-4-5-20251001"
    scored_by: "critic_1"
    dataset_tag: "lr-theory-2026-03"
    created_at: "2026-03-18T15:45:00Z"
    scored_at: "2026-03-18T16:10:00Z"

  dataset_example:
    tag: "lr-theory-2026-03"
    title: "Learning Rate Theory — March 2026"
    description: |
      Training data covering learning rate schedules, warmup strategies, and
      their interactions with model depth and batch size. Generated from 24
      local experiments and 3 reviewed arxiv papers.
    topic_tags: ["learning-rate", "warmup", "cosine-annealing", "lr-schedule", "batch-size"]
    stats:
      total_examples: 127
      curated_examples: 98
      by_format:
        qa_pair: 60
        instruction_response: 30
        dialogue: 25
        completion: 12
      by_difficulty:
        beginner: 20
        intermediate: 55
        advanced: 35
        expert: 17
      avg_quality_score: 0.81
    lora_export:
      exported_at: "2026-03-19T02:00:00Z"
      example_count: 98
      format: alpaca
      file_path: "data/training/lr-theory-2026-03/lora.jsonl"
      quality_threshold: 0.6
    status: exported
    created_at: "2026-03-17T20:00:00Z"
    last_updated: "2026-03-19T02:00:00Z"
    source_task_ids: [38, 42, 43, 44]
