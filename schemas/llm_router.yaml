# ============================================================================
# LLM ROUTER SCHEMA (CascadeRouter Pattern)
# ============================================================================
# Intelligent routing of LLM calls across local and cloud backends.
#
# PROBLEM: The crew uses LLMs constantly — for reasoning, generation, scoring,
# and synthesis. Naively calling the most capable model for every task is:
#   - Expensive (GPT-4 for a simple classification is wasteful)
#   - Slow (large models have higher latency)
#   - Fragile (single API failure = crew stops)
#
# SOLUTION: CascadeRouter. Route each LLM call to the cheapest/fastest model
# that can handle it. Fall back to more capable models only when needed.
# Maintain multiple backends so any single failure doesn't stop the crew.
#
# ROUTING STRATEGY:
#   1. Classify the request (complexity, latency requirement, cost budget)
#   2. Select the cheapest backend that meets requirements
#   3. If that backend fails or returns low-confidence output → escalate
#   4. Log routing decisions for cost tracking and optimization
#
# INSPIRED BY: SuperInstance/CascadeRouter patterns (cost optimization,
# fallback resilience, confidence-based escalation)
#
# IMPLEMENTATION NOTES:
# - Router lives in crew/llm/router.py
# - Backend configs in data/config.yaml under llm.backends
# - Routing decisions logged to data/llm_routing.log
# - Cost tracking integrated with Cloudflare credit manager
# ============================================================================

llm_backend:
  id:
    type: string
    description: "Unique backend identifier"
    example: "local_mistral_7b"

  type:
    type: enum
    values:
      - local_gguf      # llama.cpp with GGUF model (on-device)
      - local_vllm      # vLLM server (on-device, higher throughput)
      - cloudflare_ai   # Cloudflare Workers AI (free tier)
      - anthropic_api   # Anthropic Claude API
      - openai_api      # OpenAI GPT API
      - ollama          # Ollama local server
      - custom_api      # Any OpenAI-compatible API
    description: "Backend type determines how calls are made"

  model_id:
    type: string
    description: "Model identifier (path for local, model name for API)"
    example: "mistral-7b-instruct-v0.2-gguf"

  # --- Capabilities ---
  capabilities:
    type: object
    description: "What this backend can do — context size, function calling, streaming"
    fields:
      context_window_tokens:
        type: integer
        description: "Maximum context window in tokens"
        example: 32768

      supports_function_calling:
        type: boolean
        default: false
        description: "Whether this backend supports structured function/tool calls"

      supports_streaming:
        type: boolean
        default: true

      max_output_tokens:
        type: integer
        nullable: true
        description: "Maximum tokens in a single response (null = model limit)"

      languages:
        type: list
        items:
          type: string
        default: ["en"]
        description: "Languages this model handles well"

  # --- Performance Profile ---
  performance:
    type: object
    description: "Measured performance characteristics for routing decisions"
    fields:
      avg_tokens_per_second:
        type: float
        nullable: true
        description: "Measured throughput (tokens/sec). Null = not yet measured."

      avg_latency_ms:
        type: float
        nullable: true
        description: "Average time to first token (ms)"

      quality_tier:
        type: enum
        values:
          - tier_1  # Best quality (GPT-4, Claude Opus, Llama-70B)
          - tier_2  # Good quality (Claude Haiku, Mistral-7B, Llama-8B)
          - tier_3  # Fast/cheap (TinyLlama, Phi-2, CF Workers AI small)
        description: |
          Subjective quality tier. Used for routing decisions.
          Tier 3 handles simple tasks; tier 1 handles complex reasoning.

  # --- Cost ---
  cost:
    type: object
    description: "Pricing and budget information for cost-aware routing"
    fields:
      cost_per_1k_input_tokens:
        type: float
        default: 0.0
        description: "USD per 1000 input tokens. 0.0 for local/free backends."

      cost_per_1k_output_tokens:
        type: float
        default: 0.0

      uses_cloudflare_credits:
        type: boolean
        default: false
        description: "If true, calls consume Cloudflare Workers AI neurons"

      daily_limit:
        type: integer
        nullable: true
        description: "Maximum calls per day (for rate-limited free tiers)"

  # --- Health ---
  health:
    type: object
    description: "Current health status of this backend"
    fields:
      status:
        type: enum
        values:
          - healthy     # Responding normally
          - degraded    # Responding but slow or with errors
          - unavailable # Not responding
          - disabled    # Manually disabled
        default: healthy
        description: "Current operational status of this backend"

      last_checked:
        type: datetime
        nullable: true
        description: "When health was last probed"

      consecutive_failures:
        type: integer
        default: 0

      last_error:
        type: string
        nullable: true

  enabled:
    type: boolean
    default: true

# ============================================================================
# ROUTING RULE SCHEMA
# ============================================================================
# Rules determine which backend handles which type of request.
# Rules are evaluated in priority order; first match wins.

routing_rule:
  id:
    type: string
    description: "Rule identifier"
    example: "simple_classification"

  priority:
    type: integer
    description: "Lower = evaluated first. First matching rule wins."
    example: 10

  # --- Conditions (all must match) ---
  conditions:
    type: object
    description: "All conditions must be true for this rule to match"
    fields:
      task_type:
        type: list
        items:
          type: enum
          values:
            - classification      # Binary or multi-class classification
            - summarization       # Compress long text to short summary
            - qa_generation       # Generate Q&A pairs from source
            - instruction_gen     # Generate instruction-response pairs
            - reasoning           # Multi-step reasoning, analysis
            - code_generation     # Write or modify code
            - fact_check          # Verify claims against sources
            - embedding           # Generate vector embeddings
            - synthesis           # Combine multiple sources
            - planning            # Plan experiments or tasks
        nullable: true
        description: "Match if request is one of these task types (null = any)"

      max_input_tokens:
        type: integer
        nullable: true
        description: "Match if input is shorter than this (null = any length)"

      requires_function_calling:
        type: boolean
        nullable: true
        description: "Match if function calling is required (null = don't care)"

      priority_level:
        type: list
        items:
          type: enum
          values: [critical, high, normal, low, background]
        nullable: true
        description: "Match if request priority is one of these (null = any)"

      cloudflare_budget_ok:
        type: boolean
        nullable: true
        description: "Match only if CF budget is available (null = don't care)"

  # --- Action ---
  backend_preference:
    type: list
    items:
      type: string
    description: |
      Ordered list of backend IDs to try. Router tries each in order,
      falling back to the next if the current backend fails or is unavailable.
    example: ["local_mistral_7b", "cloudflare_ai", "anthropic_haiku"]

  escalation_policy:
    type: object
    description: "When to escalate to a higher-quality backend"
    fields:
      on_low_confidence:
        type: boolean
        default: false
        description: |
          If the backend returns a confidence score below threshold,
          retry with the next backend in preference list.

      confidence_threshold:
        type: float
        default: 0.7
        description: "Minimum acceptable confidence score (0.0-1.0)"

      on_error:
        type: boolean
        default: true
        description: "If backend returns an error, try next backend"

      max_escalations:
        type: integer
        default: 2
        description: "Maximum number of escalation steps before giving up"

# ============================================================================
# ROUTING REQUEST SCHEMA
# ============================================================================
# What the router receives when an agent needs an LLM call.

routing_request:
  request_id:
    type: string
    generated: true
    description: "Unique request ID for logging and tracing"

  requesting_agent:
    type: string
    description: "Agent ID making the request"
    example: "teacher_1"

  task_type:
    type: enum
    values:
      - classification
      - summarization
      - qa_generation
      - instruction_gen
      - reasoning
      - code_generation
      - fact_check
      - embedding
      - synthesis
      - planning
    description: "Type of LLM task — used for routing rule matching"

  prompt:
    type: object
    description: "The prompt to send to the LLM backend"
    fields:
      system:
        type: string
        nullable: true
        description: "System prompt"
      messages:
        type: list
        items:
          type: object
          description: "A single message in the conversation"
          fields:
            role: {type: enum, values: [user, assistant], description: "Who sent this message"}
            content: {type: string, description: "Message text"}
      max_tokens:
        type: integer
        default: 1024

  priority:
    type: enum
    values: [critical, high, normal, low, background]
    default: normal
    description: "Request urgency — affects which backends are eligible"

  requires_function_calling:
    type: boolean
    default: false

  min_quality_tier:
    type: enum
    values: [tier_1, tier_2, tier_3]
    default: tier_3
    description: "Minimum quality tier acceptable for this request"

  cost_budget_usd:
    type: float
    nullable: true
    description: "Maximum cost for this request. Router won't use backends exceeding this."

  timeout_ms:
    type: integer
    default: 30000
    description: "Maximum time to wait for response (ms)"

# ============================================================================
# ROUTING RESPONSE SCHEMA
# ============================================================================

routing_response:
  request_id:
    type: string
    description: "Matches routing_request.request_id"

  backend_used:
    type: string
    description: "Backend ID that produced the final response"

  backends_attempted:
    type: list
    items:
      type: object
      fields:
        backend_id: {type: string}
        outcome:
          type: enum
          values: [success, error, timeout, low_confidence, skipped]
          description: "What happened when this backend was tried"
        latency_ms: {type: float, nullable: true}
        error_message: {type: string, nullable: true}
    description: "All backends tried, in order"

  response:
    type: object
    description: "The final LLM response returned to the requesting agent"
    fields:
      content:
        type: string
        description: "The LLM's response text"
      confidence:
        type: float
        nullable: true
        description: "Self-reported confidence (0.0-1.0), if available"
      tokens_used:
        type: object
        description: "Token consumption for cost tracking"
        fields:
          input: {type: integer, description: "Input/prompt tokens consumed"}
          output: {type: integer, description: "Output/completion tokens generated"}

  cost_usd:
    type: float
    description: "Actual cost of this request (0.0 for local/free backends)"

  total_latency_ms:
    type: float
    description: "Total time from request to response (including escalations)"

  escalation_count:
    type: integer
    default: 0
    description: "Number of times the router escalated to a higher-quality backend"

  created_at:
    type: datetime
    generated: true
    description: "When the routing response was recorded"

# ============================================================================
# DEFAULT ROUTING RULES
# ============================================================================
# These are the default rules. Override in data/config.yaml under llm.routing_rules.

default_routing_rules:

  - id: "embedding_generation"
    priority: 5
    conditions:
      task_type: [embedding]
    backend_preference: ["local_sentence_transformers", "cloudflare_ai"]
    escalation_policy:
      on_error: true
      max_escalations: 1

  - id: "simple_classification"
    priority: 10
    conditions:
      task_type: [classification]
      max_input_tokens: 2000
    backend_preference: ["local_phi3_mini", "cloudflare_ai", "local_mistral_7b"]
    escalation_policy:
      on_low_confidence: true
      confidence_threshold: 0.8
      on_error: true
      max_escalations: 2

  - id: "bulk_generation_background"
    priority: 20
    conditions:
      task_type: [qa_generation, instruction_gen]
      priority_level: [background, low]
    backend_preference: ["cloudflare_ai", "local_mistral_7b", "anthropic_haiku"]
    escalation_policy:
      on_error: true
      max_escalations: 2

  - id: "quality_generation_normal"
    priority: 30
    conditions:
      task_type: [qa_generation, instruction_gen, summarization]
      priority_level: [normal, high]
    backend_preference: ["local_mistral_7b", "anthropic_haiku", "openai_gpt4o_mini"]
    escalation_policy:
      on_low_confidence: true
      confidence_threshold: 0.7
      on_error: true
      max_escalations: 2

  - id: "complex_reasoning"
    priority: 40
    conditions:
      task_type: [reasoning, synthesis, planning, fact_check]
    backend_preference: ["local_mistral_7b", "anthropic_haiku", "anthropic_sonnet"]
    escalation_policy:
      on_low_confidence: true
      confidence_threshold: 0.75
      on_error: true
      max_escalations: 2

  - id: "critical_reasoning"
    priority: 50
    conditions:
      task_type: [reasoning, synthesis, planning]
      priority_level: [critical]
    backend_preference: ["anthropic_sonnet", "openai_gpt4o", "anthropic_haiku"]
    escalation_policy:
      on_error: true
      max_escalations: 1

  - id: "code_generation"
    priority: 60
    conditions:
      task_type: [code_generation]
    backend_preference: ["local_mistral_7b", "anthropic_haiku", "openai_gpt4o_mini"]
    escalation_policy:
      on_low_confidence: true
      confidence_threshold: 0.8
      on_error: true
      max_escalations: 2

  - id: "fallback_any"
    priority: 999
    conditions: {}  # Matches everything
    backend_preference: ["local_mistral_7b", "cloudflare_ai", "anthropic_haiku"]
    escalation_policy:
      on_error: true
      max_escalations: 2

